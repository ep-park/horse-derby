<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Horse Derby</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="top-bar">
        <h1>Horse Derby</h1>
        <div class="race-controls">
          <label for="trackTypeSelect" class="track-select-label">Track</label>
          <select id="trackTypeSelect" class="track-select"></select>
        </div>
      </header>

      <section class="status-board">
        <p id="raceStatus">Click "Run Race" to begin.</p>
        <p id="weatherText" class="weather-text">Weather: --</p>
        <p class="safety-note">Fake currency only. No real-money gambling.</p>
        <button id="nextRaceBtn" class="race-btn next-race-btn hidden">Next Race</button>
      </section>

      <section class="betting-panel">
        <div class="wallet-row">
          <p id="playerBalanceText">Player Balance: $1000</p>
          <p id="npcPoolText">NPC Pool: $0</p>
        </div>
        <div class="bet-controls">
          <label for="betHorseSelect">Bet Horse</label>
          <select id="betHorseSelect" class="track-select"></select>
          <label for="betAmountInput">Bet Amount</label>
          <input id="betAmountInput" class="bet-input" type="number" min="1" step="1" value="100" />
          <button id="startRaceBtn" class="race-btn">Run Race</button>
        </div>
        <p id="betSummary">Choose a horse and amount, then run a race.</p>
        <div id="npcPoolBreakdown"></div>
        <div id="potentialEarningsWrap"></div>
      </section>

      <section class="stats-panel">
        <h2>Horse Stats</h2>
        <div id="statsTableWrap"></div>
      </section>

      <section class="track" id="track" aria-label="Race track lanes"></section>

      <section class="analytics-panel">
        <h2>Balance Lab</h2>
        <div class="ops-controls">
          <label class="inline-control" for="simRunsInput">
            Simulation Runs
            <input id="simRunsInput" class="bet-input" type="number" min="10" max="10000" step="10" value="500" />
          </label>
          <button id="runSimBtn" class="race-btn">Run Simulation</button>
        </div>
        <p id="simResultsText" class="helper-text">Run simulation to inspect payout and bankroll health.</p>
      </section>

      <section class="history-panel">
        <h2>Race History</h2>
        <canvas id="bankrollChart" width="920" height="140" aria-label="Bankroll trend chart"></canvas>
        <div id="historyListWrap"></div>
      </section>
    </main>

    <script src="economy.js"></script>
    <script src="script.js"></script>
  </body>
</html>
